<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Fundo laranja arredondado -->
  <rect width="1024" height="1024" rx="220" fill="#E8813A"/>

  <!-- Pata centralizada e grande -->
  <g transform="translate(512, 480)">
    <!-- Sombra sutil -->
    <g opacity="0.12" transform="translate(6, 8)">
      <ellipse cx="0" cy="110" rx="175" ry="135" fill="#000"/>
      <circle cx="-140" cy="-20" r="72" fill="#000"/>
      <circle cx="140" cy="-20" r="72" fill="#000"/>
      <circle cx="-70" cy="-130" r="60" fill="#000"/>
      <circle cx="70" cy="-130" r="60" fill="#000"/>
    </g>

    <!-- Almofada principal - azul petrol -->
    <ellipse cx="0" cy="110" rx="175" ry="135" fill="#1B8EAD"/>
    <!-- Brilho -->
    <ellipse cx="-20" cy="85" rx="90" ry="55" fill="#22A8CC" opacity="0.35"/>

    <!-- 4 dedos - branco -->
    <circle cx="-140" cy="-20" r="72" fill="#FFFFFF"/>
    <circle cx="140" cy="-20" r="72" fill="#FFFFFF"/>
    <circle cx="-70" cy="-130" r="60" fill="#FFFFFF"/>
    <circle cx="70" cy="-130" r="60" fill="#FFFFFF"/>

    <!-- Brilhos nos dedos -->
    <circle cx="-152" cy="-35" r="28" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="128" cy="-35" r="28" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="-80" cy="-143" r="22" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="58" cy="-143" r="22" fill="#FFFFFF" opacity="0.4"/>
  </g>
</svg>
